name: Cache Corruption Test

on:
  workflow_dispatch:

jobs:
  break-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Simulate REAL cache restore failure (no obvious fake exit)
      - name: Fake cache restore failure
        run: |
          echo "Restoring cache..."
          echo "Error: failed to restore cache"
          echo "Cache service unavailable"
          sleep 2
          false
