name: Cache Corruption Test

on:
  workflow_dispatch:

jobs:
  break-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ❗ Try to restore cache that doesn't exist
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: invalid-cache-key

      # ❗ FAIL only when cache is missing (realistic)
      - name: Fail on cache miss
        run: |
          echo "Cache not found for input keys"
          echo "Error: failed to restore cache"
          exit 1
