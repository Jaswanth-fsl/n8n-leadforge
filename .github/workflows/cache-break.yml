name: Cache Corruption Test

on:
  workflow_dispatch:

jobs:
  break-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm init -y

      - name: Simulate cache issue
        run: |
          echo "Error: failed to restore cache"
          echo "Cache not found for input keys"
          echo "npm ERR! enoent ENOENT"
          exit 1
