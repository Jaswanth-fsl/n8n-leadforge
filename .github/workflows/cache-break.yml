name: Cache Exists Test

on:
  workflow_dispatch:

jobs:
  cache-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore cache
        id: cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: node-cache-fixed-key

      - name: Install deps
        run: npm init -y && npm install lodash

      - name: Save cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: node-cache-fixed-key

      - name: Fail pipeline
        run: |
          echo "Error: failed to restore cache"
          echo "Cache service unavailable"
          exit 1
