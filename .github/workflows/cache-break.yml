name: Cache Corruption Test (Real)

on:
workflow_dispatch:

jobs:
break-cache:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  # Install dependencies first (creates cacheable content)
  - name: Install dependencies
    run: |
      npm init -y
      npm install lodash

  # Save cache properly
  - name: Save cache
    uses: actions/cache@v3
    with:
      path: ~/.npm
      key: node-cache-${{ github.run_id }}

  # 🔥 CORRUPT THE CACHE (REALISTIC)
  - name: Corrupt cache manually
    run: |
      echo "Corrupting cache..."
      rm -rf ~/.npm/_cacache/index-v5/*
      echo "Cache corrupted successfully"

  # 🔥 FORCE CACHE RESTORE FAILURE SIGNALS
  - name: Simulate cache restore failure
    run: |
      echo "Error: failed to restore cache"
      echo "Cache not found for input keys"
      echo "npm ERR! enoent ENOENT: no such file or directory"
      exit 1
```
