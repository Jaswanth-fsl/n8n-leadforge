name: Cache Corruption Test

on:
  workflow_dispatch:

jobs:
  break-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache (fake key)
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: fake-cache-key

      - name: Simulate cache corruption
        run: |
          echo "Cache not found for input keys"
          echo "Error: failed to restore cache"
          echo "npm ERR! enoent ENOENT: no such file or directory"
          exit 1
