name: n8n CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate JSON
        run: |
          for file in workflows/*.json; do
            echo "Checking $file"
            cat $file | jq empty
          done

  deploy-qa:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy workflows to QA
        run: |
          for file in workflows/*.json; do
            echo "Deploying $file to QA..."
            curl -s -X POST "${{ secrets.QA_N8N_URL }}/api/v1/workflows/import" \
              -H "X-N8N-API-KEY: ${{ secrets.QA_N8N_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d @$file
          done

      - name: Health check QA
        run: |
          echo "Checking QA n8n health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.QA_N8N_URL }}")
          echo "HTTP Status: $response"

          if [ "$response" -ne 200 ] && [ "$response" -ne 404 ]; then
            echo "❌ n8n is not reachable"
            exit 1
          fi

          echo "✅ n8n is reachable"