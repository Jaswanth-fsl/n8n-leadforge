name: Test Unit Failure
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          node -e "
            const result = 1 + 1;
            if (result !== 3) {
              console.error('FAIL: expected 3 but got ' + result);
              process.exit(1);
            }
          "
